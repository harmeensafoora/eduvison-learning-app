<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}EduVision{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/eduvision.css" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="/">Edu<span>Vision</span></a>

        <nav class="nav" aria-label="Primary">
          <div data-nav-anon>
            <a href="/#features">Features</a>
            <a href="/#pricing">Pricing</a>
            <a href="/login">Login</a>
            <a class="btn btn-primary btn-sm" data-ripple href="/signup">Try for free</a>
          </div>

          <div data-nav-authed style="display:none;">
            <a href="/dashboard">Dashboard</a>
            <a href="/upload">Upload</a>
            <a href="/analytics">Analytics</a>
            <a href="/settings">Settings</a>
            <a class="btn btn-ghost btn-sm" data-ripple data-logout href="#">Sign out</a>
            <span class="badge" style="margin-left:.35rem;">Hi, <span data-nav-name>You</span></span>
          </div>
        </nav>
      </div>
    </header>

    <main class="page">
      {% block content %}{% endblock %}
    </main>

    <script src="/static/eduvision.js" defer></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
